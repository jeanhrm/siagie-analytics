[phases.setup]
nixPkgs = ["php84", "php84Extensions.sqlite3", "php84Extensions.pdo", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.zip", "php84Extensions.curl", "php84Extensions.dom", "php84Extensions.intl", "php84Packages.composer", "nodejs_22"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --no-scripts"]

[phases.build]
cmds = [
    "npm install",
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"